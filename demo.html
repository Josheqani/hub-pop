<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hub-pop — demo</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at 30% 20%, #161b22, #0d1117);
        color: #c9d1d9;
      }
      main { text-align: center; padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 28px; color: #fff; }
      p { margin: 4px 0; opacity: 0.8; }
      code { color: #58a6ff; }
      .controls { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
      button {
        background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
        border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px;
      }
      button:hover { border-color: #58a6ff; }
    </style>
  </head>
  <body>
    <main>
      <h1>hub-pop</h1>
      <p>Click the floating button in the bottom-right corner.</p>
      <p>Reads from <code>./dist/index.esm.js</code> — run <code>npm run build</code> first.</p>
      <div class="controls">
        <button id="open">open()</button>
        <button id="close">close()</button>
        <button id="toggle">toggle()</button>
        <button id="theme">swap theme</button>
      </div>
    </main>

    <script type="module">
      import { HubPop } from './dist/index.esm.js';

      let widget = HubPop({
        name: 'Ali',
        github: 'https://github.com/ali',
        website: 'https://ali.dev',
        position: 'bottom-right',
        theme: 'dark',
      });

      let dark = true;
      document.getElementById('open').onclick = () => widget.open();
      document.getElementById('close').onclick = () => widget.close();
      document.getElementById('toggle').onclick = () => widget.toggle();
      document.getElementById('theme').onclick = () => {
        dark = !dark;
        widget.destroy();
        widget = HubPop({
          name: 'Ali',
          github: 'https://github.com/ali',
          website: 'https://ali.dev',
          position: 'bottom-right',
          theme: dark ? 'dark' : 'light',
        });
      };
    </script>
  </body>
</html>
